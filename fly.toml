app = "atlas-api"
primary_region = "bom"

[build]
  dockerfile = "apps/server/Dockerfile"

[env]
  NODE_ENV = "production"
  HOST = "0.0.0.0"
  PORT = "8787"
  ATLAS_REQUIRE_AUTH = "true"
  ATLAS_TERMINAL_ENABLED = "true"
  ATLAS_WORKSPACE_ROOT = "/data/atlas-workspaces"

[http_service]
  internal_port = 8787
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[[mounts]]
  source = "atlas_workspaces"
  destination = "/data"

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1
