name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check API server
        run: npm run build --workspace=@apps/server

      - name: Typecheck web app
        run: npx tsc --noEmit -p apps/desktop/tsconfig.json

      - name: Build web app
        run: npm run build --workspace=@apps/desktop
